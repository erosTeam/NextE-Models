name: Release waifu2x photo NNRT model

on:
  push:
    tags:
      - "waifu2x-photo-noise0-x2-nnrt-v*"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pinned exporter
        run: |
          python -m pip install numpy==1.26.4
          python -m pip install --index-url https://download.pytorch.org/whl/cpu torch==2.2.2
          python -m pip install onnx==1.16.0
      - name: Fetch locked inputs
        run: |
          python scripts/fetch_locked_source.py models/waifu2x-photo-noise0-x2/source.lock.json downloads/waifu2x-photo.param --entry parameter
          python scripts/fetch_locked_source.py models/waifu2x-photo-noise0-x2/source.lock.json downloads/waifu2x-photo.bin --entry weights
          python scripts/fetch_locked_source.py models/waifu2x-photo-noise0-x2/source.lock.json downloads/mindspore-lite.tar.gz --entry converter
          mkdir -p work/mindspore
          tar -xzf downloads/mindspore-lite.tar.gz -C work/mindspore --strip-components=1
          test -x work/mindspore/tools/converter/converter/converter_lite
      - name: Rebuild and verify immutable asset
        run: |
          python scripts/export_waifu2x_photo_noise0_x2_onnx.py --parameter downloads/waifu2x-photo.param --weights downloads/waifu2x-photo.bin --output work/waifu2x-photo-noise0-x2-156.onnx
          python scripts/convert_mindspore.py --converter work/mindspore/tools/converter/converter/converter_lite --onnx work/waifu2x-photo-noise0-x2-156.onnx --output artifacts/waifu2x-photo-noise0-x2-156-fp16.ms --input-shape 1,3,156,156 --mode fp16
          python scripts/verify_publishable.py --model waifu2x_photo_noise0_x2_nnrt_fp16 --artifact artifacts/waifu2x-photo-noise0-x2-156-fp16.ms
      - uses: actions/upload-artifact@v4
        with:
          name: waifu2x-photo-noise0-x2-156-fp16-release
          path: artifacts/waifu2x-photo-noise0-x2-156-fp16.ms
          if-no-files-found: error
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/download-artifact@v4
        with:
          name: waifu2x-photo-noise0-x2-156-fp16-release
          path: artifacts
      - name: Verify release metadata and artifact
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          python -c 'import json,os; data=json.load(open("manifests/models-v1.json")); entry=next(item for item in data["models"] if item["id"]=="waifu2x_photo_noise0_x2_nnrt_fp16"); expected="https://github.com/erosTeam/NextE-Models/releases/download/"+os.environ["RELEASE_TAG"]+"/"+entry["artifact"]["fileName"]; assert entry["status"]=="published"; assert entry["artifact"]["urls"]==[expected]'
          python scripts/verify_publishable.py --model waifu2x_photo_noise0_x2_nnrt_fp16 --artifact artifacts/waifu2x-photo-noise0-x2-156-fp16.ms --tag "$RELEASE_TAG"
      - name: Create immutable GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" artifacts/waifu2x-photo-noise0-x2-156-fp16.ms --verify-tag --generate-notes --title "$GITHUB_REF_NAME"
