name: Validate

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  repository:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install Pillow==10.4.0
      - run: python -m compileall -q scripts tests
      - run: python -m unittest discover -s tests -v
      - run: python scripts/validate_repository.py
