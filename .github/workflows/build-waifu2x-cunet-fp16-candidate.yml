name: Build waifu2x CUNet FP16 candidate

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/build-waifu2x-cunet-fp16-candidate.yml"
      - "models/waifu2x-cunet-noise0-x2/source.lock.json"
      - "scripts/convert_mindspore.py"
      - "scripts/export_waifu2x_cunet_noise0_x2_onnx.py"
      - "scripts/fetch_locked_source.py"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pinned exporter
        run: |
          python -m pip install numpy==1.26.4
          python -m pip install --index-url https://download.pytorch.org/whl/cpu torch==2.2.2
          python -m pip install onnx==1.16.0
      - name: Fetch locked inputs
        run: |
          python scripts/fetch_locked_source.py models/waifu2x-cunet-noise0-x2/source.lock.json downloads/waifu2x-cunet.param --entry parameter
          python scripts/fetch_locked_source.py models/waifu2x-cunet-noise0-x2/source.lock.json downloads/waifu2x-cunet.bin --entry weights
          python scripts/fetch_locked_source.py models/waifu2x-cunet-noise0-x2/source.lock.json downloads/mindspore-lite.tar.gz --entry converter
          mkdir -p work/mindspore artifacts
          tar -xzf downloads/mindspore-lite.tar.gz -C work/mindspore --strip-components=1
      - name: Export and convert
        run: |
          python scripts/export_waifu2x_cunet_noise0_x2_onnx.py \
            --parameter downloads/waifu2x-cunet.param \
            --weights downloads/waifu2x-cunet.bin \
            --output work/waifu2x-cunet-noise0-x2-164.onnx
          python scripts/convert_mindspore.py \
            --converter work/mindspore/tools/converter/converter/converter_lite \
            --onnx work/waifu2x-cunet-noise0-x2-164.onnx \
            --output artifacts/waifu2x-cunet-noise0-x2-164-fp16.ms \
            --input-shape 1,3,164,164 \
            --mode fp16
      - uses: actions/upload-artifact@v4
        with:
          name: waifu2x-cunet-noise0-x2-164-fp16-candidate
          path: |
            artifacts/waifu2x-cunet-noise0-x2-164-fp16.ms
            artifacts/waifu2x-cunet-noise0-x2-164-fp16.ms.candidate.json
            work/waifu2x-cunet-noise0-x2-164.onnx
          if-no-files-found: error
