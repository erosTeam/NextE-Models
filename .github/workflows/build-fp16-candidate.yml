name: Build FP16 candidate

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pinned exporter
        run: |
          python -m pip install --index-url https://download.pytorch.org/whl/cpu torch==2.2.2
          python -m pip install onnx==1.16.0
      - name: Fetch locked inputs
        run: |
          python scripts/fetch_locked_source.py models/realesrgan-x2plus/source.lock.json downloads/RealESRGAN_x2plus.pth
          python scripts/fetch_locked_source.py models/realesrgan-x2plus/source.lock.json downloads/mindspore-lite.tar.gz --entry converter
          mkdir -p work/mindspore
          tar -xzf downloads/mindspore-lite.tar.gz -C work/mindspore --strip-components=1
      - name: Export and convert
        run: |
          python scripts/export_realesrgan_x2plus_onnx.py --checkpoint downloads/RealESRGAN_x2plus.pth --output work/realesrgan-x2plus-180.onnx
          python scripts/convert_mindspore.py --converter work/mindspore/tools/converter/converter/converter_lite --onnx work/realesrgan-x2plus-180.onnx --output artifacts/realesrgan-x2plus-180-fp16.ms --mode fp16
          python scripts/verify_publishable.py --model realesrgan_x2plus_nnrt_fp16 --artifact artifacts/realesrgan-x2plus-180-fp16.ms
      - uses: actions/upload-artifact@v4
        with:
          name: realesrgan-x2plus-180-fp16-candidate
          path: |
            artifacts/realesrgan-x2plus-180-fp16.ms
            artifacts/realesrgan-x2plus-180-fp16.ms.candidate.json
          if-no-files-found: error
