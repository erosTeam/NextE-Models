name: Release unified model pack

on:
  push:
    tags:
      - "model-pack-v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate unified release manifests
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          python -c 'import json,os; models=json.load(open("manifests/models-v1.json")); runtime=json.load(open("manifests/ncnn-runtime-assets-v1.json")); comic=json.load(open("manifests/comic-translation-models-v1.json")); assert models["releaseTag"]==os.environ["RELEASE_TAG"]; assert runtime["releaseTag"]==os.environ["RELEASE_TAG"]; assert comic["releaseTag"]==os.environ["RELEASE_TAG"]'
          python scripts/validate_repository.py
      - name: Build the published comic models
        run: |
          python -m pip install \
            --index-url https://download.pytorch.org/whl/cpu \
            torch==2.8.0
          python -m pip install \
            numpy==2.2.6 \
            onnx==1.17.0 \
            packaging==25.0 \
            paddlepaddle==3.0.0 \
            paddle2onnx==2.1.0 \
            pnnx==20260526 \
            pyyaml==6.0.2
          python scripts/fetch_locked_source.py \
            models/ysgyolo-1.2-os1/source.lock.json \
            downloads/ysgyolo_1.2_OS1.0.onnx \
            --entry sourceOnnx
          python scripts/convert_ysgyolo_onnx_to_ncnn.py \
            --pnnx "$(python -c 'import shutil; print(shutil.which("pnnx"))')" \
            --onnx downloads/ysgyolo_1.2_OS1.0.onnx \
            --output-dir artifacts/comic-generated
          mkdir -p downloads/ppocrv5-mobile-rec
          python scripts/fetch_locked_source.py \
            models/ppocrv5-mobile-rec/source.lock.json \
            downloads/ppocrv5-mobile-rec/inference.json \
            --entry inferenceJson
          python scripts/fetch_locked_source.py \
            models/ppocrv5-mobile-rec/source.lock.json \
            downloads/ppocrv5-mobile-rec/inference.pdiparams \
            --entry inferenceParams
          python scripts/fetch_locked_source.py \
            models/ppocrv5-mobile-rec/source.lock.json \
            downloads/ppocrv5-mobile-rec/inference.yml \
            --entry inferenceYml
          python scripts/convert_ppocrv5_mobile_rec_to_ncnn.py \
            --paddle2onnx "$(python -c 'import shutil; print(shutil.which("paddle2onnx"))')" \
            --pnnx "$(python -c 'import shutil; print(shutil.which("pnnx"))')" \
            --model-dir downloads/ppocrv5-mobile-rec \
            --output-dir artifacts/comic-generated
          python -m pip install --upgrade onnx==1.18.0
          python scripts/fetch_locked_source.py \
            models/comic-text-mask-ctd-1024/source.lock.json \
            downloads/comictextdetector.pt.onnx \
            --entry sourceOnnx
          python scripts/convert_comic_text_mask_ctd_to_ncnn.py \
            --pnnx "$(python -c 'import shutil; print(shutil.which("pnnx"))')" \
            --onnx downloads/comictextdetector.pt.onnx \
            --output-dir artifacts/comic-generated
          mkdir -p downloads/aot-manga-inpainting-256
          python scripts/fetch_locked_source.py \
            models/aot-manga-inpainting-256/source.lock.json \
            downloads/aot-manga-inpainting-256/inpainting.ckpt \
            --entry checkpoint
          python scripts/fetch_locked_source.py \
            models/aot-manga-inpainting-256/source.lock.json \
            downloads/aot-manga-inpainting-256/inpainting_aot.py \
            --entry architectureSource
          python scripts/convert_aot_manga_inpainting_to_ncnn.py \
            --pnnx "$(python -c 'import shutil; print(shutil.which("pnnx"))')" \
            --checkpoint downloads/aot-manga-inpainting-256/inpainting.ckpt \
            --source downloads/aot-manga-inpainting-256/inpainting_aot.py \
            --output-dir artifacts/comic-generated
      - name: Collect and verify all published assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p artifacts/model-pack
          gh release download model-pack-v1.0.0 \
            --dir artifacts/model-pack \
            --pattern '*.ms' \
            --pattern '*.zip' \
            --pattern '*.param' \
            --pattern '*.bin'
          cp models/ysgyolo-1.2-os1/sources/ysgyolo_1.2_OS1.0.pt \
            artifacts/model-pack/ysgyolo_1.2_OS1.0.pt
          cp downloads/ysgyolo_1.2_OS1.0.onnx \
            artifacts/model-pack/ysgyolo_1.2_OS1.0.onnx
          cp licenses/YSGYolo-AGPL-3.0.txt \
            artifacts/model-pack/YSGYolo-AGPL-3.0.txt
          cp licenses/ESPCN-PyTorch-Apache-2.0.txt \
            artifacts/model-pack/PP-OCRv5-Apache-2.0.txt
          python scripts/prepare_model_pack_release_assets.py \
            --models-manifest manifests/models-v1.json \
            --runtime-manifest manifests/ncnn-runtime-assets-v1.json \
            --comic-manifest manifests/comic-translation-models-v1.json \
            --generated-comic-dir artifacts/comic-generated \
            --output artifacts/model-pack
          cp manifests/models-v1.json artifacts/model-pack/models-v1.json
          cp manifests/ncnn-runtime-assets-v1.json artifacts/model-pack/ncnn-runtime-assets-v1.json
          cp manifests/comic-translation-models-v1.json artifacts/model-pack/comic-translation-models-v1.json
          cp models/ysgyolo-1.2-os1/source.lock.json artifacts/model-pack/ysgyolo-1.2-os1-source.lock.json
          cp models/ppocrv5-mobile-rec/source.lock.json artifacts/model-pack/ppocrv5-mobile-rec-source.lock.json
          cp models/aot-manga-inpainting-256/source.lock.json artifacts/model-pack/aot-manga-inpainting-256-source.lock.json
          cp models/comic-text-mask-ctd-1024/source.lock.json artifacts/model-pack/comic-text-mask-ctd-1024-source.lock.json
          cp scripts/convert_comic_text_mask_ctd_to_ncnn.py artifacts/model-pack/comic-text-mask-ctd-1024-conversion.py
          cp THIRD_PARTY_NOTICES.md artifacts/model-pack/THIRD_PARTY_NOTICES.md
      - name: Create immutable model-pack release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" artifacts/model-pack/* \
            --verify-tag --generate-notes --title "$GITHUB_REF_NAME"
