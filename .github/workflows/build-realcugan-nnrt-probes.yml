name: Build Real-CUGAN NNRT probes

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/build-realcugan-nnrt-probes.yml"
      - "models/realcugan-se-2x-conservative/source.lock.json"
      - "scripts/convert_mindspore.py"
      - "scripts/export_realcugan_se_2x_conservative_onnx.py"
      - "scripts/fetch_locked_source.py"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pinned exporter
        run: |
          python -m pip install numpy==1.26.4
          python -m pip install --index-url https://download.pytorch.org/whl/cpu torch==2.2.2
          python -m pip install onnx==1.16.0
      - name: Fetch locked inputs
        run: |
          python scripts/fetch_locked_source.py models/realcugan-se-2x-conservative/source.lock.json downloads/updated_weights.zip
          python scripts/fetch_locked_source.py models/realcugan-se-2x-conservative/source.lock.json downloads/upcunet_v3.py --entry source
          python scripts/fetch_locked_source.py models/realcugan-se-2x-conservative/source.lock.json downloads/mindspore-lite.tar.gz --entry converter
          mkdir -p work/realcugan work/mindspore work/probes artifacts/probes
          unzip -q downloads/updated_weights.zip 'updated_weights/up2x-latest-conservative.pth' -d work/realcugan
          tar -xzf downloads/mindspore-lite.tar.gz -C work/mindspore --strip-components=1
      - name: Export and convert probes
        run: |
          python scripts/export_realcugan_se_2x_conservative_onnx.py \
            --checkpoint work/realcugan/updated_weights/up2x-latest-conservative.pth \
            --source downloads/upcunet_v3.py \
            --output work/realcugan-se-2x-conservative-164.onnx \
            --probe-directory work/probes
          declare -A shapes=(
            [slice]=1,3,164,164
            [se76]=1,64,76,76
            [stride2-conv]=1,64,160,160
            [deconv2]=1,64,76,76
            [deconv4]=1,64,150,150
            [u1-conv1]=1,3,164,164
            [u1-se]=1,3,164,164
            [u1-add]=1,3,164,164
            [u1-conv3]=1,3,164,164
            [u1-output]=1,3,164,164
            [unet1]=1,3,164,164
            [unet2]=1,3,296,296
          )
          for probe in slice se76 stride2-conv deconv2 deconv4 \
            u1-conv1 u1-se u1-add u1-conv3 u1-output unet1 unet2; do
            python scripts/convert_mindspore.py \
              --converter work/mindspore/tools/converter/converter/converter_lite \
              --onnx "work/probes/$probe.onnx" \
              --output "artifacts/probes/$probe.ms" \
              --input-shape "${shapes[$probe]}" \
              --mode fp16
          done
      - uses: actions/upload-artifact@v4
        with:
          name: realcugan-nnrt-operator-probes
          path: |
            artifacts/probes/*.ms
            work/probes/*.onnx
          if-no-files-found: error
